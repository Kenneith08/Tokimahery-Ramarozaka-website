<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – Tokimahery Ramarozaka</title>
    <meta name="description"
        content="Contact Tokimahery Ramarozaka for courses, consultation and research collaboration">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header class="navbar">
        <div class="logo">
            <button class="burger" id="burger">
                <span></span><span></span><span></span>
            </button>
            <a href="index.html"><img src="logo.png" alt="T. Ramarozaka"></a>
        </div>
        <nav>
            <a href="index.html"><img src="house-solid-full.svg" class="nav-icon"> HOME</a>
            <a href="blog.html"><img src="file-solid-full.svg" class="nav-icon"> BLOG</a>
            <a href="courses.html"><img src="book-solid-full.svg" class="nav-icon"> COURSES</a>
            <a href="testimonial.html"><img src="comment-solid-full.svg" class="nav-icon"> TESTIMONIALS</a>
            <a href="research.html"><img src="magnifying-glass-solid-full.svg" class="nav-icon"> RESEARCH</a>
        </nav>
    </header>
    <section class="contact-header">
        <h1>Let's <em>talk</em></h1>
        <p>Have a project, a question, or want to book a course? Send a message.</p>
    </section>
    <section class="contact-body">
        <div class="contact-form-wrap">
            <form action="https://formspree.io/f/xqeyrrnn" method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label>FIRST NAME</label>
                        <input type="text" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label>LAST NAME</label>
                        <input type="text" name="lastName" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>EMAIL</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label>PHONE</label>
                        <input type="tel" name="phone">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex:1;">
                        <label>MESSAGE</label>
                        <textarea name="message" required></textarea>
                    </div>
                </div>
                <input type="hidden" name="_captcha" value="false">
                <button class="btn-submit" type="submit">
                    SEND MESSAGE →
                </button>
            </form>
        </div>
        <div class="contact-sidebar">
            <div class="info-card">
                <h3>Contact Info</h3>
                <p>Email: tokimahery.ramarozaka@gmail.com</p>
                <p>Location: Antananarivo, Madagascar</p>
                <p>Languages: Malagasy · French · English</p>
            </div>
        </div>
    </section>
</body>

</html>
